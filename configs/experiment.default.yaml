experiment:
  name: default_pipeline
  reports_dir: reports

data:
  data_path: tests/fixtures/market_small.csv
  series_len: 120
  horizon: 10

train:
  algo: ppo
  seed: 42
  total_timesteps: 200
  order_size: 30000.0
  terminal_penalty: 20.0
  reward_scale: 500.0
  idle_penalty: 2.0
  learning_rate: 0.0001
  ent_coef: 0.03

eval:
  train_len: 8
  test_len: 4
  step: 4
